<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leropong Guest House</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="menu-btn">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="brand">
            <span class="brand-name">LEROPONG</span>
            <span class="brand-sub">GUEST HOUSE</span>
        </div>
        <button class="nav-book">BOOK NOW</button>
    </header>

    <main class="hero-section">
        <h1 class="special-title">STAY LONGER <br> SPECIAL</h1>
        
        <div class="hero-image-container">
            <img src="Screenshot 2026-03-01 at 16.58.03.png" alt="Leropong Guest House Logo" class="hero-img">
        </div>

        <div class="price-container">
            <span class="price-label">FROM</span>
            <span class="currency-box">BWP</span>
            <span class="price-amount">1,377</span>
        </div>

        <button class="main-cta">BOOK NOW</button>
        
        <p class="description">We're making it easy to enjoy extra nights</p>
    </main>

</body>
</html>
